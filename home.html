        * {

main {
  justify-content: center;

a {

.top {

}

.navbar {
    position: fixed;
    left:0;

    padding: 25px 100px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index:  100;
}


.content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
    height: 100vh;
    padding: 50px 100px 0;
    min-height: 100hv;
}

.icons {
    position: relative;
    top: -15px;
    left: -80px;
    width: 60px;
    height: 60px;
    background: none;
    border: none;
    border-radius: 0;
    z-index: 1000;
    transition: all 0.3s ease;

}

.shift-right {
  transform: translateX(75px);
  border-radius: 50%; 
  border: 3px solid gold;
}

.icons img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: inherit;
  transition: inherit;
}

#sidebar {
  position: fixed;
  top: 0;
  left: -250px;
  width: 250px;
  height: 100%;
  background: #333;
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  transition: 0.3s;
  padding-top: 60px;
}

#sidebar a {
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  color: white;
  padding: 10px 20px;
  margin: 5px 10px;
  text-decoration: none;
  transition: all 0.5s ease;
  cursor: default;
}

#sidebar a i {
  margin-right: 10px;
  transition: color 0.3s;
   position: relative;
  z-index: 1;
}

#sidebar a span {
  position: relative;
  z-index: 1;
}



#sidebar a:hover {
  background: white;
  color: black;

}

#sidebar a:hover i {
  color: black;
}

#sidebar a:hover i {
  color: black;
}


#sidebar .logout {
  margin-top: auto;

}

#sidebar a::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  transform: translateX(-100%);
  transition: transform 0.5s ease;
  z-index: 0;
}

#sidebar a:hover::before {
  transform: translateX(0);

}

#sidebar a:hover span {
  color: black;
}

#sidebar.active {
  left: 0;
}

.sidebar-title {
  color: white;
  text-align: center;
  padding: 15px 20px;
  margin: 0 0 10px 0;
  align-items: center;
  font-size: 24px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255, 255, 255, 0.2); /* optional: garis bawah */
}

/* Dark mode*/
body.dark #sidebar {
  background: #1e1e1e;
}

body.dark #sidebar a {
  color: white;
}

body.dark #sidebar a:hover {
  background: white;
  color: black;
}

/* Light mode*/
body.light #sidebar {
  background: #f0f0f0;
}

body.light #sidebar a {
  color: black;
}

body.light #sidebar a:hover {
  background: black;
  color:white;
}

body.light #sidebar a::before {
  background: black;
}

body.dark #sidebar a::before {
  background: white;
}

body.light .sidebar-title {
  color: black;
  border-bottom: 1px solid rgba(0, 0, 0, 0.2);
}

body.dark .sidebar-title {
  color: white;

body.light #sidebar a:hover span {

body.light #sidebar a:hover i {

function copyText() {
  const teks = document.getElementById("id").innerText;
  const notif = document.getElementById("notif");

  navigator.clipboard.writeText(teks).then(() => {
    notif.classList.add("show");
    setTimeout(() => {
      notif.classList.remove("show");
    }, 1500);

  })
}
</script>

editNameBtn.addEventListener('click', () => {

  editNameBtn.style.display = 'none';
  profileNameInput.style.display = 'inline-block';
  saveNameBtn.style.display = 'inline-block';

});

saveNameBtn.addEventListener('click', () => {
  const newName = profileNameInput.value.trim();
  if(newName !== "") {
    profileName.textContent = newName;
    sidebarTitle.textContent = newName; // update sidebar title
  }
  profileName.style.display = 'inline';
  editNameBtn.style.display = 'inline-block';
  profileNameInput.style.display = 'none';
  saveNameBtn.style.display = 'none';
});

  <script>
function toggleTheme() {
  const btn = document.getElementById("themeBtn");

  if (document.body.classList.contains("dark")) {
    document.body.classList.remove("dark");
    document.body.classList.add("light");
    localStorage.setItem("theme", "light");
    btn.innerText = "Dark Mode";
  } else {
    document.body.classList.remove("light");
    document.body.classList.add("dark");
    localStorage.setItem("theme", "dark");
    btn.innerText = "Light Mode";
  }
}
</script>

  <script>
function setTheme(mode) {
  document.body.classList.remove("dark", "light");
  document.body.classList.add(mode);
  localStorage.setItem("theme", mode);

  const btn = document.getElementById("themeBtn");

  if (mode === "dark") {
    btn.innerText = "Light Mode";
  } else {
    btn.innerText = "Dark Mode";
  }
}

const savedTheme = localStorage.getItem("theme") || "light";
setTheme(savedTheme);
</script>
